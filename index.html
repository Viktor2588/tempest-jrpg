<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Tempest – Chronik ist ein deutsches JRPG-Prototyp-Spiel mit taktischem Kampf, Party-Progression und mobile-first Phaser-Rendering." />
  <meta name="application-name" content="Tempest – Chronik" />
  <meta property="og:title" content="Tempest – Chronik" />
  <meta property="og:description" content="Ein mobile-first JRPG-Prototyp mit taktischem Kampf, Progression und Tempest-Erkundung." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#0b0f16" />
  <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
  <title>Tempest – Chronik</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0f16; overflow: hidden; }
    #game { width: 100vw; height: 100dvh; touch-action: none; }
    #game canvas { display: block; margin: 0 auto; }
    #orientation-gate { display: none; }
    @media (orientation: portrait) and (max-width: 600px) {
      #game { visibility: hidden; }
      #orientation-gate {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 2rem;
        box-sizing: border-box;
        color: #e9eef7;
        background: #0b0f16;
        font: 1rem/1.5 system-ui, sans-serif;
        text-align: center;
      }
      #orientation-gate strong { color: #e9c56c; font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <div id="orientation-gate" role="status" aria-live="polite">
    <strong>Bitte ins Querformat drehen</strong>
    <span>Tempest – Chronik braucht die breite Ansicht für lesbare Texte und Bedienelemente.</span>
  </div>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
