name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Berechtigungen für das GITHUB_TOKEN, damit nach Pages deployt werden darf
permissions:
  contents: read
  pages: write
  id-token: write

# Parallele Deployments verhindern; laufendes Deployment nicht abbrechen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Tests + Typecheck müssen grün sein, bevor gebaut und deployt wird.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (Vite → dist)
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite-Build-Ausgabe als statische Seite hochladen
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
