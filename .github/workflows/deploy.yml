name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Reine Doku-Commits (PLAN/PROJECT_KNOWLEDGE-Archivierung etc.) aendern das
    # gebaute dist nicht — nicht deployen, damit sich keine Pages-Deploys stauen.
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

# Berechtigungen für das GITHUB_TOKEN, damit nach Pages deployt werden darf
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Pages-Deploy zugleich. Ueberholte Runs abbrechen statt stauen: bei
# schnell aufeinanderfolgenden Pushes blockierten sonst wartende Deploys das
# github-pages-Environment, bis actions/deploy-pages nach ~10 min timeoutete
# („Timeout reached, aborting!"). Es zaehlt ohnehin nur der neueste Stand.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Tests + Typecheck müssen grün sein, bevor gebaut und deployt wird.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests (Vitest)
        run: bun run test

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run browser smoke (Playwright)
        # Keep smoke fast. Full projects can be run manually if needed.
        run: bun run test:e2e --project=desktop-chromium --project=mobile-chromium

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build (Vite → dist)
        run: bun run build
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Vite-Build-Ausgabe als statische Seite hochladen
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
