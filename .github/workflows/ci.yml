name: CI

# Schnelles Test-Feedback auf Feature-Branches und PRs.
# Pushes auf main werden vom Deploy-Workflow getestet (kein Doppellauf).
on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test
