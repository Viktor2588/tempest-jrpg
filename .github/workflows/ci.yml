name: CI

# Schnelles Test-Feedback auf Feature-Branches und PRs.
# Pushes auf main werden vom Deploy-Workflow getestet (kein Doppellauf).
on:
  push:
    branches-ignore: [main]
    # Skip pure documentation changes for faster CI (E2E especially benefits).
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'PLAN.md'
      - 'TODO.md'
      - 'ASSETS.md'
  pull_request:
    # Same filter for PRs: doc-only changes don't need full test matrix + E2E smoke.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'PLAN.md'
      - 'TODO.md'
      - 'ASSETS.md'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck

  unit:
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        # 4 shards bring the ~55s full unit run down to ~12-18s per job (parallel)
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run unit tests (shard ${{ matrix.shard }}/4)
        run: bun run test:shard ${{ matrix.shard }}/4

  e2e:
    runs-on: ubuntu-latest
    needs: [typecheck, unit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run browser smoke (Playwright)
        # Regular CI smoke: desktop + mobile only for speed.
        # Full 4-project run (incl. HiDPI) can be run locally with `bun run test:e2e`.
        run: bun run test:e2e --project=desktop-chromium --project=mobile-chromium
